<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frampersand — Overlay Showcase</title>
  <link rel="stylesheet" href="showcase.css" />
  <link rel="stylesheet" href="../sources/randomizer/index.css" />
</head>

<body>
  <header class="showcase-header">
    <h1>Interactive Overlay Showcase</h1>
    <p>Preview bot sources in a mock Twitch layout. Use the controls below the stream to trigger each feature.</p>
  </header>

  <main class="showcase-main">
    <section class="stream-column">
      <div class="stream-stage" id="stream-stage">
        <div class="stream-stage-inner" id="stream-stage-inner">
          <div class="stream-layer layer-background-color" id="layer-background-color"></div>
          <div class="stream-layer layer-background-pattern" id="layer-background-pattern"></div>
          <div class="stream-layer layer-sprites" id="layer-sprites"></div>
          <div class="stream-layer layer-randomizer" id="layer-randomizer"></div>
          <div class="stream-layer layer-pmd-chat" id="layer-pmd-chat">
            <div id="chat-container" class="chat-up portrait-rounded"></div>
          </div>
          <div class="stream-layer layer-rain" id="layer-rain">
            <div class="rain-gif" id="rain-gif"></div>
          </div>
          <div class="stream-chrome">
            <span class="stream-live-badge">LIVE</span>
            <span class="stream-title">Frampersand · Overlay Demo</span>
          </div>
        </div>
      </div>

      <section class="controls-panel" aria-label="Overlay controls">
        <article class="control-card">
          <h3>Sprite border</h3>
          <div class="toggle-row">
            <label for="toggle-sprites">Show layer</label>
            <input type="checkbox" id="toggle-sprites" checked />
          </div>
          <div class="control-row">
            <input type="number" id="sprite-number" placeholder="Dex # (empty = random)" min="1" max="893" />
            <button class="btn btn-primary" id="sprite-add-btn" type="button">Add</button>
          </div>
          <div class="control-row">
            <button class="btn" id="sprite-random-btn" type="button">Random</button>
            <button class="btn btn-ghost" id="sprite-clear-btn" type="button">Clear</button>
          </div>
        </article>

        <article class="control-card">
          <h3>Background</h3>
          <div class="toggle-row">
            <label for="toggle-background-color">Color layer</label>
            <input type="checkbox" id="toggle-background-color" checked />
          </div>
          <div class="toggle-row">
            <label for="toggle-background-pattern">Pattern layer</label>
            <input type="checkbox" id="toggle-background-pattern" checked />
          </div>
          <div class="control-row">
            <button class="btn" data-color="1a1a2e" type="button">Midnight</button>
            <button class="btn" data-color="124071" type="button">Ocean</button>
            <button class="btn" data-color="494981" type="button">PMD</button>
          </div>
          <div class="control-row">
            <input type="text" id="background-color" placeholder="Hex color (e.g. 9146ff)" />
            <button class="btn btn-primary" id="color-btn" type="button">Apply</button>
          </div>
          <div class="control-row">
            <input type="number" id="pattern-number" placeholder="Dex # (empty = random)" min="1" max="1010" />
            <button class="btn btn-primary" id="pattern-btn" type="button">Apply</button>
          </div>
        </article>

        <article class="control-card">
          <h3>Randomizer</h3>
          <div class="toggle-row">
            <label for="toggle-randomizer">Show layer</label>
            <input type="checkbox" id="toggle-randomizer" checked />
          </div>
          <div class="control-row">
            <button class="btn btn-primary" id="randomize-btn" type="button">Deal with it!</button>
          </div>
        </article>

        <article class="control-card">
          <h3>Rain</h3>
          <div class="toggle-row">
            <label for="toggle-rain">Show layer</label>
            <input type="checkbox" id="toggle-rain" checked />
          </div>
          <div class="control-row">
            <button class="btn btn-primary" id="rain-btn" type="button">Make it rain</button>
          </div>
        </article>

        <article class="control-card">
          <h3>PMD chat</h3>
          <div class="toggle-row">
            <label for="toggle-pmd">Show layer</label>
            <input type="checkbox" id="toggle-pmd" checked />
          </div>
          <div class="toggle-row">
            <label for="toggle-pmd-sync">Sync with mock chat</label>
            <input type="checkbox" id="toggle-pmd-sync" checked />
          </div>
          <div class="control-row">
            <button class="btn btn-primary" id="pmd-test-btn" type="button">Test message</button>
          </div>
        </article>
      </section>
    </section>

    <aside class="chat-column">
      <div class="chat-header">Stream Chat</div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-mock">
        <input type="text" placeholder="Send a message (mock)" disabled />
      </div>
    </aside>
  </main>

  <audio id="rain-audio" src="../assets/rain.mp4" preload="auto"></audio>
  <script src="/socket.io/socket.io.js"></script>
  <script src="../libs/tinycolor/tinycolor.js"></script>
  <script src="index.js" type="module"></script>
</body>

</html>
